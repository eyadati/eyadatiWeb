   <!-- Splash Screen Styles -->
   <style>
   * {
     margin: 0;
     padding: 0;
     box-sizing: border-box;
   }
   
html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: white;
      transition: opacity 0.3s ease-out;
    }
   
   .splash-screen.fade-out {
     opacity: 0;
     pointer-events: none;
   }
   
   .splash-logo {
     width: 100px;
     height: 100px;
     background: white;
     border-radius: 24px;
     display: flex;
     justify-content: center;
     align-items: center;
     box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
     animation: pulse 2s ease-in-out infinite;
   }
   
   .splash-logo img {
     width: 80px;
     height: 80px;
     object-fit: contain;
   }
   
   .splash-title {
     margin-top: 24px;
     font-size: 28px;
     font-weight: 700;
     color: white;
     letter-spacing: -0.5px;
   }
   
   .splash-loader {
     margin-top: 48px;
     width: 40px;
     height: 40px;
     border: 3px solid rgba(255, 255, 255, 0.2);
     border-top-color: white;
     border-radius: 50%;
     animation: spin 1s linear infinite;
   }
   
   @keyframes spin {
     0% { transform: rotate(0deg); }
     100% { transform: rotate(360deg); }
   }
   
   @keyframes pulse {
     0%, 100% { transform: scale(1); }
     50% { transform: scale(1.05); }
   }
   
@media (prefers-color-scheme: dark) {
      html, body {
        background-color: #121212;
      }
    }
   
   /* Hide splash once Flutter loads */
   body.flutter-loaded .splash-screen {
     opacity: 0;
     pointer-events: none;
   }

<script src="flutter_bootstrap.js" async></script>
    
    <!-- PWA Service Worker Update Detection -->
    <script>
      // Check for service worker updates
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('flutter_service_worker.js?v=' + Date.now())
            .then(function(registration) {
              console.log('Service Worker registered');
              
              // Check for updates periodically
              setInterval(function() {
                registration.update();
              }, 60 * 60 * 1000); // Check every hour
              
              // Listen for updates
              registration.addEventListener('updatefound', function() {
                var newWorker = registration.installing;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version available
                    if (confirm('A new version of Eyadati is available. Reload to update?')) {
                      window.location.reload();
                    }
                  }
                });
              });
            })
            .catch(function(error) {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
      
      // Hide splash when Flutter is ready
      window.addEventListener('flutter-first-frame', function() {
       document.body.classList.add('flutter-loaded');
       setTimeout(function() {
         var splash = document.getElementById('splash');
         if (splash) splash.remove();
       }, 300);
     });
   </script>
