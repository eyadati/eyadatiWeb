  <!-- Splash Screen Styles -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #1565C0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1565C0 0%, #1976D2 100%);
      transition: opacity 0.3s ease-out;
    }
    
    .splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    
    .splash-logo {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }
    
    .splash-logo img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    
    .splash-title {
      margin-top: 24px;
      font-size: 28px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }
    
    .splash-subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }
    
    .splash-loader {
      margin-top: 48px;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @media (prefers-color-scheme: dark) {
      html, body {
        background-color: #0D47A1;
      }
    }
    
    /* Hide splash once Flutter loads */
    body.flutter-loaded .splash-screen {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div class="splash-screen" id="splash">
    <div class="splash-logo">
      <img src="icons/Icon-192.png" alt="Logo">
    </div>
    <div class="splash-title">عيادتي</div>
    <div class="splash-subtitle">Eyadati</div>
    <div class="splash-loader"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Hide splash when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      document.body.classList.add('flutter-loaded');
      setTimeout(function() {
        var splash = document.getElementById('splash');
        if (splash) splash.remove();
      }, 300);
    });
    
    // PWA Install Prompt
    var deferredPrompt;
    window.addEventListener('beforeinstallprompt', function(e) {
      deferredPrompt = e;
      if (window.hasPrompt) window.hasPrompt();
    });
    
    window.promptInstall = function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(choiceResult) {
          if (choiceResult.outcome === 'accepted') {
            if (window.appInstalled) window.appInstalled();
          }
          deferredPrompt = null;
        });
      }
    };
  </script>
</body>
