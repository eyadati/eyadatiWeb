name: eyadati
description: "Eyadati - Clinic Appointment Booking PWA"
publish_to: 'none'

version: 1.0.1+3

environment:
  sdk: ^3.8.1
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.1
  provider: ^6.1.5+1
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  firebase_ui_auth: ^3.0.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.0.0
  image_picker: ^1.2.1
  flutter_heatmap_calendar: ^1.0.5
  settings_ui: ^2.0.2
  flutter_slidable: ^4.0.1
  supabase_flutter: ^2.10.0
  deferred_indexed_stack: ^0.0.4+hotfix.1
  google_maps_url_extractor: ^2.0.1
  modal_bottom_sheet: ^3.0.0
  google_places_flutter: ^2.1.0
  sliding_up_panel: ^2.0.0+1
  flex_color_scheme: ^8.4.0
  marquee: ^2.3.0
  url_launcher: ^6.3.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  easy_localization: ^3.0.8
  shared_preferences: ^2.5.4
  table_calendar: ^3.2.0
  flutter_floating_bottom_bar: ^1.3.0
  lucide_icons: ^0.257.0
  connectivity_plus: ^7.0.0
  qr_flutter: ^4.1.0
  file_picker: ^10.3.8
  chargily_pay: ^0.0.1
  flutter_markdown_plus: ^1.0.7
  rxdart: ^0.28.0
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.4.0
  shimmer: ^3.0.0
  geoflutterfire_plus: ^0.0.34
  flutter_lucide_animated: ^0.0.4
  pwa_install: ^0.0.6
  web: ^1.1.1
 

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  mockito: ^5.6.1
  build_runner: ^2.10.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
  test: any
  flutter_launcher_icons: ^0.14.4
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
     - assets/avatars/1.png
     - assets/avatars/2.png
     - assets/avatars/3.png
     - assets/avatars/4.png
     - assets/avatars/5.png
     - assets/avatars/6.png
     - assets/avatars/7.png
     - assets/avatars/8.png
     - assets/avatars/9.png
     - assets/avatars/10.png
     - assets/doctors.png
     - assets/doctors2.png
     - assets/family.png
     - assets/logo.png
     - assets/screenshot.jpg
     - assets/icon.png
     - assets/translations/en.json
     - assets/translations/fr.json
     - assets/translations/ar.json
     - privacy_policy.md
     - terms_of_service.md

flutter_launcher_icons:
  web:
    generate: true
    image_path: "assets/Eyadati_logo.png"
    flush: true
  android: "launcher_icon"
  ios: true
  image_path: "assets/Eyadati_logo.png"
